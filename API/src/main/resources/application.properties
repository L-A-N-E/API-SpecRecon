spring.application.name=SpecRecon

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.tomcat.max-http-post-size=1048576
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

server.ssl.enabled=true
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3
server.ssl.key-store=${SSL_KEYSTORE_PATH}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS}
server.port=8443

app.security.payload-signature-key=${PAYLOAD_SIGNATURE_KEY:}

app.security.data-encryption-key=${DATA_ENCRYPTION_KEY:}

app.security.jwt-secret=${JWT_SECRET:}
app.security.jwt-expiration=3600000
app.security.jwt-refresh-expiration=86400000

app.security.pseudonymization-salt=${PSEUDONYMIZATION_SALT:}

logging.level.root=INFO
logging.level.br.com.lane.SpecRecon=DEBUG
logging.level.org.springframework.security=DEBUG
logging.structured.format.console=ecs
logging.structured.format.file=ecs
logging.file.name=logs/specrecon.log
